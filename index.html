                if (status === 'learning') return <ReviewIcon />;
                if (status === 'completed') return <CheckCircleIcon className="text-green-600" />;
                if (status === 'in_progress') return <InProgressIcon />;
                return <div className="w-5 h-5 flex-shrink-0 border-2 border-gray-300 rounded-full"></div>;
            };

            return (
                <div onClick={() => onSelect(topic)} className={`relative flex items-center justify-between p-4 rounded-lg paper hover:bg-gray-100 cursor-pointer transition-all duration-200

                    <div className="flex items-center">

                                {messages.map((msg, index) => (
                                    <div key={index} className={`flex items-end gap-2 ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        {msg.sender === 'ai' && <div className="w-8 h-8 rounded-full bg-primary-200 flex items-center justify-center flex-shrink-0"><BrainIcon className="w-5 h-5 text-primary-700" /></div>}
                                        <div className={`max-w-lg px-4 py-3 rounded-2xl ${msg.sender === 'user' ? 'bg-primary-600 text-white rounded-br-none' : 'bg-gray-800 text-chalk-text rounded-bl-none'}`}>
                                            <p className="whitespace-pre-wrap">{msg.text}</p>
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex items-end gap-2 justify-start">
                                        <div className="w-8 h-8 rounded-full bg-primary-200 flex items-center justify-center flex-shrink-0"><BrainIcon className="w-5 h-5 text-primary-700" /></div>
                                        <div className="max-w-lg px-4 py-3 rounded-2xl bg-gray-800 text-chalk-text rounded-bl-none">
                                            <div className="flex items-center space-x-2 dot-pulse">
                                                <div className="w-2 h-2 bg-chalk-text rounded-full"></div>
                                                <div className="w-2 h-2 bg-chalk-text rounded-full"></div>
                                                <div className="w-2 h-2 bg-chalk-text rounded-full"></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {topicUnderstood && (
                                    <div className="text-center p-4">
                                        <button onClick={onExit} className="py-2 px-4 bg-primary-600 text-white font-semibold rounded-lg hover:bg-primary-700 transition">Lesson Complete! Back to Subject</button>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>
                        </div>
                        <form onSubmit={handleSendMessage} className="p-4 border-t border-gray-700 flex items-center gap-4">
                            <input
                                type="text"
                                value={userInput}
                                onChange={(e) => setUserInput(e.target.value)}
                                placeholder="Ask a question or respond..."
                                className="w-full p-3 text-gray-800 paper rounded-lg border-2 border-gray-300 focus:border-primary-500 focus:outline-none transition"
                                disabled={isLoading || topicUnderstood}
                            />
                            <button type="submit" disabled={isLoading || !userInput.trim() || topicUnderstood} className="p-3 bg-primary-600 text-white rounded-lg disabled:bg-primary-300 disabled:cursor-not-allowed hover:bg-primary-700 transition">
                                <SendIcon />
                            </button>
                        </form>
                    </div>
                </div>
            );
        };


        const LoginScreen = ({ onLogin }) => {
            const [name, setName] = useState('');
            const [selectedClass, setSelectedClass] = useState('10');
            const [language, setLanguage] = useState('Hinglish');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name.trim()) {
                    onLogin({ name, class: selectedClass, language });
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-md p-8 space-y-8 paper rounded-2xl shadow-2xl relative">
                        <div className="absolute -top-4 -right-4 text-4xl text-accent-yellow floating floating-1">📚</div>
                        <div className="absolute -bottom-4 -left-4 text-4xl text-accent-red floating floating-3">✏️</div>
                        
                        <div className="text-center relative z-10">
                            <div className="flex justify-center">
                                <div className="chalkboard p-3 rounded-full">
                                    <Logo />
                                </div>
                            </div>
                            <h1 className="text-4xl font-bold text-gray-800 mt-4 font-chalk">ScortIQ</h1>
                            <p className="text-gray-600 mt-2 handwritten">Your digital classroom for smarter learning</p>
                        </div>
                        <form className="space-y-6 relative z-10" onSubmit={handleSubmit}>
                            <div>
                                <label htmlFor="name" className="text-sm font-bold text-gray-800 handwritten">Name</label>
                                <input id="name" type="text" value={name} onChange={e => setName(e.target.value)} required className="w-full p-3 mt-1 text-gray-800 paper rounded-lg border-2 border-gray-200 focus:border-primary-500 focus:outline-none transition" />
                            </div>
                             <div>
                                <label htmlFor="class" className="text-sm font-bold text-gray-800 handwritten">Class</label>
                                <select id="class" value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full p-3 mt-1 text-gray-800 paper rounded-lg border-2 border-gray-200 focus:border-primary-500 focus:outline-none transition">
                                    <option value="9">Class 9</option>
                                    <option value="10">Class 10</option>
                                    <option value="11">Class 11</option>
                                    <option value="12">Class 12</option>
                                </select>
                            </div>
                            <div>
                                <label htmlFor="language" className="text-sm font-bold text-gray-800 handwritten">Preferred Language</label>
                                <select id="language" value={language} onChange={e => setLanguage(e.target.value)} className="w-full p-3 mt-1 text-gray-800 paper rounded-lg border-2 border-gray-200 focus:border-primary-500 focus:outline-none transition">
                                    <option value="Hinglish">Hinglish</option>
                                    <option value="English">English</option>
                                    <option value="Hindi">Hindi</option>
                                    <option value="Telugu">Telugu</option>
                                    <option value="Punjabi">Punjabi</option>
                                    <option value="Gujarati">Gujarati</option>
                                </select>
                            </div>
                            <button type="submit" className="w-full py-3 font-bold text-white bg-primary-600 rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition chalk-btn">Enter Classroom</button>
                        </form>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('socratic_user')) || null);
            const [userProgress, setUserProgress] = useState(() => JSON.parse(localStorage.getItem('socratic_progress')) || {});
            const [currentView, setCurrentView] = useState(() => localStorage.getItem('socratic_user') ? 'dashboard' : 'login');
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [selectedTopic, setSelectedTopic] = useState(null);
            const [selectedEquation, setSelectedEquation] = useState(null);
            const [currentChapterTitle, setCurrentChapterTitle] = useState('');

            const curriculumData = useMemo(() => {
                return user?.class ? ncertCurriculum[user.class] : { subjects: [] };
            }, [user?.class]);
            
            useEffect(() => { if(user) localStorage.setItem('socratic_user', JSON.stringify(user)); }, [user]);
            useEffect(() => { localStorage.setItem('socratic_progress', JSON.stringify(userProgress)); }, [userProgress]);

            const updateStreak = () => {
                if (!user) return;
                const today = new Date().toDateString();
                const lastDate = user.streak?.lastDate ? new Date(user.streak.lastDate).toDateString() : null;
                if (lastDate !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const isContinuing = lastDate === yesterday.toDateString();
                    setUser(prev => ({
                        ...prev,
                        streak: {
                            count: isContinuing ? (prev.streak?.count || 0) + 1 : 1,
                            lastDate: new Date().toISOString()
                        }
                    }));
                }
            };

            const sendWelcomeEmail = (userName, userClass) => {
                emailjs.send('service_2pd5enl', 'template_rf67iad', {
                    user_name: userName,
                    user_class: userClass,
                    login_time: new Date().toLocaleString(),
                }).then(res => console.log('Email success!', res.status), err => console.log('Email failed...', err));
            };

            const handleLogin = (userData) => { 
                setUser({ ...userData, points: 0, streak: { count: 1, lastDate: new Date().toISOString() } }); 
                setCurrentView('dashboard'); 
                sendWelcomeEmail(userData.name, userData.class);
            };

            const handleLogout = () => {
                localStorage.clear();
                setUser(null);
                setCurrentView('login');
            };

            const handleSelectSubject = (subject) => { 
                setSelectedSubject(subject); 
                setCurrentView('subject'); 
            };
            
            const handleSelectTopic = (topic) => { 
                if (!userProgress[topic.id]) {
                    setUserProgress(prev => ({ ...prev, [topic.id]: { status: 'in_progress' } }));
                }
                updateStreak();
                setSelectedTopic(topic); 
                setCurrentView('topic'); 
            };
            
            const handleSelectEquation = (equation, chapterTitle) => {
                updateStreak();
                setSelectedEquation(equation);
                setCurrentChapterTitle(chapterTitle);
                setCurrentView('equation');
            };

            const updateTopicStatus = (topicId, newStatus) => {
                setUserProgress(prev => ({ ...prev, [topicId]: { ...prev[topicId], status: newStatus } }));
            };

            const incrementUserPoints = (amount) => {
                setUser(prev => ({ ...prev, points: (prev.points || 0) + amount }));
            };
            
            const navigateTo = (view) => { 
                setSelectedSubject(null); 
                setSelectedTopic(null); 
                setSelectedEquation(null);
                setCurrentView(view); 
            };

            const renderContent = () => {
                switch (currentView) {
                    case 'dashboard': 
                        return <Dashboard user={user} onSelectSubject={handleSelectSubject} onSelectTopic={handleSelectTopic} userProgress={userProgress} curriculumData={curriculumData} />;
                    
                    case 'subject': 
                        if (!selectedSubject) { navigateTo('dashboard'); return null; }
                        return (
                            <>
                                <div className="flex justify-between items-center mb-4">
                                    <div className="chalkboard rounded-xl p-4">
                                        <h1 className="text-3xl font-bold chalk-text font-chalk">{selectedSubject.name}</h1>
                                    </div>
                                    <button onClick={() => navigateTo('dashboard')} className="paper-btn text-gray-800 font-bold py-2 px-4 rounded-lg">
                                        ← Back to Dashboard
                                    </button>
                                </div>
                                {selectedSubject.chapters.map(ch => (
                                    <Chapter 
                                        key={ch.id} 
                                        chapter={ch} 
                                        userProgress={userProgress} 
                                        topicAccuracies={{}}
                                        onSelectTopic={handleSelectTopic} 
                                        onSelectEquation={handleSelectEquation}
                                    />
                                ))}
                            </>
                        );
                    
                    case 'topic': 
                        if (!selectedTopic) { navigateTo('subject'); return null; }
                        return <ChatTutor topic={selectedTopic} user={user} onExit={() => setCurrentView('subject')} updateTopicStatus={updateTopicStatus} incrementUserPoints={incrementUserPoints} />;

                    case 'equation':
                        if (!selectedEquation) { navigateTo('subject'); return null; }
                        return <EquationTutor equation={selectedEquation} chapterTitle={currentChapterTitle} user={user} onExit={() => setCurrentView('subject')} incrementUserPoints={incrementUserPoints} />;

                    default: 
                        return <LoginScreen onLogin={handleLogin} />;
                }
            };
            
            if (!user) return <LoginScreen onLogin={handleLogin} />;

            return (
                <div className="min-h-screen text-gray-800">
                    <nav className="bg-chalkboard/90 backdrop-blur-sm p-4 flex justify-between items-center sticky top-0 z-40 border-b border-gray-700 shadow-sm">
                        <div className="flex items-center space-x-4">
                            <button onClick={() => navigateTo('dashboard')} className="flex items-center gap-2 text-xl font-bold text-white font-chalk">
                                <div className="p-1 rounded-full bg-white/10">
                                    <Logo />
                                </div>
                                <span>ScortIQ</span>
                            </button>
                        </div>
                        <div className="flex items-center space-x-6">
                            <div className="hidden sm:flex items-center space-x-4">
                                <div className="text-yellow-400 font-bold">⭐ {user.points || 0}</div>
                                <div className="text-orange-400 font-bold">🔥 {user.streak?.count || 0}</div>
                            </div>
                            <div className="text-right">
                                <div className="text-white font-semibold">{user.name} <span className="text-xs text-gray-300">(Class {user.class})</span></div>
                                <button onClick={handleLogout} className="text-sm text-gray-300 hover:underline">Logout</button>
                            </div>
                        </div>
                    </nav>
                    <main className="max-w-5xl mx-auto p-4 sm:p-6 md:p-8">
                        <div key={currentView} className="fade-enter fade-enter-active"> 
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
